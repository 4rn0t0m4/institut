name: Deploy to OVH
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM dependencies & Build
        run: |
          npm install
          npm run build

      - name: Sync files to OVH (via RSYNC)
        uses: Burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr --delete
          path: ./
          remote_path: /home/instiqh/app/  # À adapter selon votre dossier OVH
          remote_host: ${{ secrets.OVH_HOST }}
          remote_user: ${{ secrets.OVH_USER }}
          remote_key: ${{ secrets.OVH_SSH_KEY }}
          # On exclut ce qui ne doit pas être écrasé
          args: --exclude='.env' --exclude='storage/app/*.json' --exclude='vendor'
